<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Found Item | MVGR Lost & Found</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <header> 
        <div class="logo">
            <div class="logo-icon">
                <i class="fa fa-magnifying-glass"></i>
            </div>
            <div>
                <h1>Lost & Found</h1>
                <p>MVGRCE</p>
            </div>
        </div>
        <button onclick="window.location.href='index.html'">Back to home</button>
    </header>
    <main>
        <h2>Report a Found Item</h2>
        <form action="/report" method="POST" enctype="multipart/form-data">
            <div>
                <label>Your name:</label>
                <input name="finderName" type="text" placeholder="enter name" required>
            </div>
            <div>
                <label>Enter mobile number:</label>
                <input name="phone" type="tel" placeholder="phone number" required>
            </div>
            <div>
                <label>Item name:</label>
                <input name="itemName" type="text" placeholder="item name" required>
            </div>
            <div>
                <label>location:</label>
                <input name="location" type="text" placeholder="where did you find it?" required>
            </div>
            <div>
                <label>upload image:</label>
                <input name="image" type="file">
            </div>
            <button>Submit</button>
        </form>
        

    </main>
    <footer>
        <p>Lost & Found Portal</p>
        <p>MVGR College Of Engineering</p>
    </footer>    
</body>
</html>
