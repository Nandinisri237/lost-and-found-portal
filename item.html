<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Item Details | MVGR Lost & Found</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <header> 
        <div class="logo">
            <div class="logo-icon">
                <i class="fa fa-magnifying-glass"></i>
            </div>
            <div>
                <h1>Lost & Found</h1>
                <p>MVGRCE</p>
            </div>
        </div>
        <button onclick="window.location.href='index.html'">Back to Home</button>
    </header>
    <main>
        <div class="item-container">
            <img id="itemImage">
            <h2 id="itemName"></h2>
            <p id="itemLocation"></p>
            <p id="itemDate"></p>
            <p id="itemFinder"></p>
            <p id="itemPhone"></p>
            <button>Contact Finder</button>
        </div>
        
    </main>
    <footer>
        <p>Lost & Found Portal</p>
        <p>MVGR College Of Engineering</p>  
    </footer>
    <script src="itemPage.js"></script>
</body>
</html>
